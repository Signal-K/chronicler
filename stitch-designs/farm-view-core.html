<body class="h-screen w-full flex flex-col bg-background font-body-md text-on-surface overflow-hidden select-none">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-4 h-16 docked full-width top-0 border-b-4 border-[#2A1B14] bg-[#5C3D2E] dark:bg-[#3E291F] shadow-[0_4px_0_0_rgba(0,0,0,0.3)] z-40 relative">
<button class="text-[#F5E6D3] dark:text-[#DBCFB0] hover:bg-[#744F3C] transition-all active:translate-y-1 active:shadow-none p-2 flex items-center justify-center border-2 border-transparent focus:border-outline">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">menu</span>
</button>
<h1 class="font-['Space_Grotesk'] font-bold uppercase tracking-wider text-xl text-[#F5E6D3] drop-shadow-[2px_2px_0px_rgba(0,0,0,1)]">
            Bee Farm
        </h1>
<div class="font-['Space_Grotesk'] font-bold uppercase tracking-wider text-[#F5E6D3] dark:text-[#DBCFB0] bg-primary border-2 border-on-surface px-3 py-1 shadow-[inset_2px_2px_0px_rgba(0,0,0,0.5)] text-sm flex gap-4">

<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">monetization_on</span>

            </span>
<span class="flex items-center gap-1 text-secondary-fixed drop-shadow-[1px_1px_0px_rgba(0,0,0,1)]">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">water_drop</span>
                Water: 10
            </span>
</div>
</header>
<!-- Main Canvas Area -->
<main class="flex-1 relative bg-secondary-fixed-dim paper-texture flex items-center justify-center z-10 pt-4 pb-24 shadow-[inset_0_0_60px_rgba(0,0,0,0.2)]">
<!-- Farm Grid Container (Wooden Planter Box Style) -->
<div class="relative bg-surface-tint border-[4px] border-on-surface p-4 shadow-[8px_8px_0px_rgba(0,0,0,0.4)]">
<!-- Inner Box Shadowing -->
<div class="bg-primary-container border-[4px] border-[#a07455] border-b-[#4a2e1d] border-r-[#4a2e1d] p-3">
<!-- 2x5 Soil Plot Grid -->
<div class="grid grid-cols-2 gap-3">
<!-- Plot 1: Lavender (Growing) -->
<div class="w-20 h-20 bg-primary border-[4px] border-[#2d1a10] border-t-on-surface border-l-on-surface shadow-[inset_2px_2px_4px_rgba(0,0,0,0.6)] relative flex items-end justify-center group cursor-pointer hover:border-tertiary-fixed-dim transition-colors">
<div class="absolute bottom-2 w-12 h-4 bg-[#2d1a10] rounded-[50%] blur-[1px]"></div>
<span class="material-symbols-outlined text-[#b39ddb] text-4xl mb-1 drop-shadow-[2px_2px_0px_rgba(0,0,0,0.8)] z-10 origin-bottom group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">eco</span>
<!-- Growth progress indicator -->
<div class="absolute top-1 left-1 flex gap-[2px]">
<div class="w-1.5 h-1.5 bg-secondary-fixed"></div>
<div class="w-1.5 h-1.5 bg-secondary-fixed"></div>
<div class="w-1.5 h-1.5 bg-on-surface"></div>
</div>
</div>

</div>
<!-- Plot 3: Sunflower (Mature) -->

<div class="absolute bottom-2 w-12 h-4 bg-[#2d1a10] rounded-[50%] blur-[1px]"></div>
<span class="material-symbols-outlined text-tertiary-fixed-dim text-[40px] mb-1 drop-shadow-[2px_2px_0px_rgba(0,0,0,0.8)] z-10 origin-bottom group-hover:-translate-y-1 transition-transform" style="font-variation-settings: 'FILL' 1;">local_florist</span>
</div>

<div class="w-20 h-20 bg-primary border-[4px] border-[#2d1a10] border-t-on-surface border-l-on-surface shadow-[inset_2px_2px_4px_rgba(0,0,0,0.6)] relative cursor-pointer hover:border-tertiary-fixed-dim transition-colors">
</div>

<span class="material-symbols-outlined text-secondary-fixed text-2xl mb-1 drop-shadow-[2px_2px_0px_rgba(0,0,0,0.8)] z-10" style="font-variation-settings: 'FILL' 1;">spa</span>
<div class="absolute top-1 left-1 flex gap-[2px]">
<div class="w-1.5 h-1.5 bg-secondary-fixed"></div>
<div class="w-1.5 h-1.5 bg-on-surface"></div>
<div class="w-1.5 h-1.5 bg-on-surface"></div>
</div>
</div>

<div class="w-20 h-20 bg-primary border-[4px] border-[#2d1a10] border-t-on-surface border-l-on-surface shadow-[inset_2px_2px_4px_rgba(0,0,0,0.6)] relative cursor-pointer hover:border-tertiary-fixed-dim transition-colors">
</div>
<!-- Plot 7: Empty -->
<div class="w-20 h-20 bg-primary border-[4px] border-[#2d1a10] border-t-on-surface border-l-on-surface shadow-[inset_2px_2px_4px_rgba(0,0,0,0.6)] relative cursor-pointer hover:border-tertiary-fixed-dim transition-colors">
</div>

<div class="absolute bottom-2 w-8 h-3 bg-[#2d1a10] rounded-[50%] blur-[1px]"></div>
<span class="material-symbols-outlined text-secondary-fixed text-2xl mb-1 drop-shadow-[2px_2px_0px_rgba(0,0,0,0.8)] z-10" style="font-variation-settings: 'FILL' 1;">spa</span>
</div>
<!-- Plot 9: Empty -->
<div class="w-20 h-20 bg-primary border-[4px] border-[#2d1a10] border-t-on-surface border-l-on-surface shadow-[inset_2px_2px_4px_rgba(0,0,0,0.6)] relative cursor-pointer hover:border-tertiary-fixed-dim transition-colors">
</div>
<!-- Plot 10: Empty -->
<div class="w-20 h-20 bg-primary border-[4px] border-[#2d1a10] border-t-on-surface border-l-on-surface shadow-[inset_2px_2px_4px_rgba(0,0,0,0.6)] relative cursor-pointer hover:border-tertiary-fixed-dim transition-colors">
</div>
</div>
</div>
<!-- Bee Hive Decor -->
<div class="absolute -right-16 top-10 w-24 h-24 flex flex-col items-center justify-end z-20 group cursor-pointer drop-shadow-[4px_4px_0px_rgba(0,0,0,0.3)]">

<div class="w-3 h-full bg-on-surface"></div>
</div>
<div class="w-16 h-4 bg-tertiary-fixed-dim border-4 border-t-0 border-on-surface rounded-b-full z-10"></div>

<div class="absolute top-0 right-2 w-2 h-2 bg-on-surface animate-bounce group-hover:translate-x-2 transition-transform">

</div>

<button class="w-14 h-14 bg-surface border-[4px] border-tertiary-fixed-dim flex items-center justify-center relative active:translate-y-1 transition-transform">

<button class="w-14 h-14 bg-surface-container-highest border-[4px] border-outline border-b-[6px] border-b-on-surface-variant flex items-center justify-center active:translate-y-1 active:border-b-[4px] transition-all hover:bg-surface-variant">

<button class="flex flex-col items-center justify-center bg-[#744F3C] text-yellow-400 border-2 border-yellow-400 rounded-sm m-1 p-1 shadow-[inset_2px_2px_0px_rgba(0,0,0,0.5)] active:scale-95 transition-transform w-16 h-16">
<span class="material-symbols-outlined mb-1 text-2xl drop-shadow-[1px_1px_0px_rgba(0,0,0,0.8)]" style="font-variation-settings: 'FILL' 1;">grass</span>

</button>
<!-- Hives -->
<button class="flex flex-col items-center justify-center text-[#F5E6D3] p-2 hover:bg-[#4E3427] active:scale-95 transition-transform w-16 h-16">

<span class="material-symbols-outlined mb-1 text-2xl">handyman</span>

</button>
