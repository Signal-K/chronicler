<body class="bg-surface text-on-background h-screen w-screen flex flex-col overflow-hidden selection:bg-secondary-fixed selection:text-on-secondary-fixed">

<div class="absolute inset-0 border-[2px] border-surface-variant m-[2px] pointer-events-none"></div>
<!-- Header Section -->
<div class="relative z-10 border-b-4 border-on-surface pb-4 flex justify-between items-end">
<div>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest block mb-1">Status</span>
<h2 class="font-headline-lg text-headline-lg text-primary m-0 leading-none">Hive #1</h2>
</div>
<div class="bg-secondary-fixed text-on-secondary-fixed border-2 border-on-surface px-2 py-1 shadow-[2px_2px_0_0_#1f1c0b] font-label-sm text-label-sm uppercase flex items-center gap-1">

</div>

<span class="font-headline-lg text-headline-lg text-on-surface">98</span>
<span class="font-label-sm text-label-sm text-primary-fixed-dim">%</span>
</div>
</div>

<span class="material-symbols-outlined text-[#4A90E2] text-[18px]" style="font-variation-settings: 'FILL' 1;">water_drop</span>

<div class="mt-2 flex items-baseline gap-1">
<span class="font-headline-lg text-headline-lg text-on-surface">100</span>

</div>
</div>
</div>

</div>
